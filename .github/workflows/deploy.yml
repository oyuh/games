name: Deploy Hooks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy-vercel:
    name: Trigger Vercel deploy hook
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Call Vercel hook
        run: |
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

  deploy-railway:
    name: Trigger Railway deploy hook
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Call Railway hook
        run: |
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}

  hooks-missing:
    name: Hooks not configured
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL == '' && secrets.RAILWAY_DEPLOY_HOOK_URL == '' }}
    steps:
      - name: Explain missing hooks
        run: |
          echo "No deploy hooks configured. Add one or both repository secrets:"
          echo "- VERCEL_DEPLOY_HOOK_URL"
          echo "- RAILWAY_DEPLOY_HOOK_URL"
