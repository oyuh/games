name: Deploy Hooks

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-passing-commit:
    name: Deploy Passing Commit
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured; skipping Vercel."
            exit 0
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}

      - name: Trigger Railway deploy hook
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL is not configured; skipping Railway."
            exit 0
          fi
          curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}

  ci-did-not-pass:
    name: CI Did Not Pass
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip deployment
        run: |
          echo "CI concluded with '${{ github.event.workflow_run.conclusion }}'. Deployment hooks were not triggered."
